<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Publishers</title>
</head>
<body>
<h1>Publishers</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Publisher Name</th>
        <th>Address</th>
        <th>City</th>
        <th>State</th>
        <th>Zip Code</th>
    </tr>

    <tr th:each="publisher : ${publishers}">
        <td th:text="${publisher.id}"></td>
        <td th:text="${publisher.publisherName}"></td>
        <td th:text="${publisher.address}"></td>
        <td th:text="${publisher.city}"></td>
        <td th:text="${publisher.state}"></td>
        <td th:text="${publisher.zipCode}"></td>
    </tr>
</table>

</body>
</html>
